# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Docker Compose Production Override
#
# Security hardening for production deployments:
#   - ClickHouse with resource limits
#   - Resource limits for all services
#   - No development convenience ports exposed
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── ClickHouse — production resource limits ─────────────────────────────────
  clickhouse:
    environment:
      CLICKHOUSE_DB: nextraceone_analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - nextraceone-net
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
    restart: unless-stopped

  # ── PostgreSQL — resource limits ────────────────────────────────────────────
  postgres:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M

  # ── ApiHost — production TLS and resource limits ────────────────────────────
  apihost:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      NEXTRACE_AUTO_MIGRATE: "false"
      Telemetry__ObservabilityProvider__Provider: ClickHouse
      Telemetry__ObservabilityProvider__ClickHouse__Enabled: "true"
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: http://clickhouse:8123
      Analytics__ConnectionString: http://clickhouse:8123
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M

  # ── Workers — production resource limits ────────────────────────────────────
  workers:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Telemetry__ObservabilityProvider__Provider: ClickHouse
      Telemetry__ObservabilityProvider__ClickHouse__Enabled: "true"
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: http://clickhouse:8123
      Analytics__ConnectionString: http://clickhouse:8123
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  # ── Ingestion — production resource limits ──────────────────────────────────
  ingestion:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Telemetry__ObservabilityProvider__Provider: ClickHouse
      Telemetry__ObservabilityProvider__ClickHouse__Enabled: "true"
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: http://clickhouse:8123
      Analytics__ConnectionString: http://clickhouse:8123
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  # ── Frontend — resource limits ──────────────────────────────────────────────
  frontend:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  clickhouse-data:
    driver: local
