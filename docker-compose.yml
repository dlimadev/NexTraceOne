# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Docker Compose (Aplicação Completa)
#
# Stack mínima para desenvolvimento local e staging:
#   - PostgreSQL (4 bancos lógicos)
#   - ClickHouse (observabilidade e analytics — provider padrão)
#   - OpenTelemetry Collector (pipeline de ingestão — modo de coleta configurável)
#   - ApiHost (API principal)
#   - BackgroundWorkers (jobs assíncronos)
#   - Ingestion.Api (integrações externas)
#   - Frontend (React SPA via nginx)
#
# Provider analítico: ClickHouse
# Modos de coleta: OpenTelemetry Collector (Kubernetes) ou CLR Profiler (IIS/Windows)
#
# Uso:
#   cp .env.example .env && nano .env   # Configurar variáveis
#   docker compose up -d                # Subir stack completa
#   docker compose down -v              # Parar e remover volumes
#
# Para desenvolvimento local (com override):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL (com pgvector para RAG semântico — E-A01) ────────────────────
  # Usa a imagem pgvector/pgvector:pg16 que inclui a extensão pgvector pré-instalada.
  # A extensão é activada por CREATE EXTENSION via EF Core migration.
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextraceone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
      - ./infra/postgres/apply-rls.sql:/rls/apply-rls.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextraceone}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nextraceone-net

  # ── ClickHouse (observabilidade e analytics — provider padrão) ──────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: nextraceone_analytics
      CLICKHOUSE_USER: nextraceone
      CLICKHOUSE_PASSWORD: nextraceone
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextraceone-net

  # ── OpenTelemetry Collector ─────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./build/otel-collector/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Prometheus metrics
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - nextraceone-net

  # ── ApiHost ─────────────────────────────────────────────────────────────────
  apihost:
    build:
      context: .
      dockerfile: Dockerfile.apihost
    image: nextraceone/apihost:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Staging}
      ASPNETCORE_URLS: http://+:8080

      # Connection string — 1 single physical database (architecture: 1 DB, isolation by prefix + DbContext)
      ConnectionStrings__NexTraceOne: ${CONNECTION_STRING_NEXTRACEONE:?CONNECTION_STRING_NEXTRACEONE is required}

      # JWT
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: ${JWT_ISSUER:-NexTraceOne}
      Jwt__Audience: ${JWT_AUDIENCE:-NexTraceOne}

      # Migrations (apenas Staging com consentimento explícito)
      NEXTRACE_AUTO_MIGRATE: ${NEXTRACE_AUTO_MIGRATE:-false}

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OpenTelemetry__Endpoint: http://otel-collector:4317
      Telemetry__ObservabilityProvider__Provider: ClickHouse
      Telemetry__ObservabilityProvider__ClickHouse__Enabled: "true"
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: http://clickhouse:8123
      Analytics__ConnectionString: http://clickhouse:8123
      Telemetry__CollectionMode__ActiveMode: ${COLLECTION_MODE:-OpenTelemetryCollector}
      Telemetry__CollectionMode__OpenTelemetryCollector__OtlpGrpcEndpoint: http://otel-collector:4317
      Telemetry__CollectionMode__OpenTelemetryCollector__OtlpHttpEndpoint: http://otel-collector:4318
      Telemetry__CollectionMode__ClrProfiler__OtlpEndpoint: http://otel-collector:4317
      Telemetry__Collector__OtlpGrpcEndpoint: http://otel-collector:4317
      Telemetry__Collector__OtlpHttpEndpoint: http://otel-collector:4318

      # Integrity check (desabilitar apenas em CI)
      NEXTRACE_SKIP_INTEGRITY: ${NEXTRACE_SKIP_INTEGRITY:-false}

      # CORS
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${APIHOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - nextraceone-net

  # ── BackgroundWorkers ────────────────────────────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    image: nextraceone/workers:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Staging}
      ASPNETCORE_URLS: http://+:8081

      ConnectionStrings__NexTraceOne: ${CONNECTION_STRING_NEXTRACEONE:?CONNECTION_STRING_NEXTRACEONE is required}

      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OpenTelemetry__Endpoint: http://otel-collector:4317
      Telemetry__ObservabilityProvider__Provider: ClickHouse
      Telemetry__ObservabilityProvider__ClickHouse__Enabled: "true"
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: http://clickhouse:8123
      Analytics__ConnectionString: http://clickhouse:8123

      NEXTRACE_SKIP_INTEGRITY: ${NEXTRACE_SKIP_INTEGRITY:-false}
    ports:
      - "${WORKERS_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      apihost:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - nextraceone-net

  # ── Ingestion API ────────────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    image: nextraceone/ingestion:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Staging}
      ASPNETCORE_URLS: http://+:8082

      ConnectionStrings__NexTraceOne: ${CONNECTION_STRING_NEXTRACEONE:?CONNECTION_STRING_NEXTRACEONE is required}

      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: ${JWT_ISSUER:-NexTraceOne}
      Jwt__Audience: ${JWT_AUDIENCE:-NexTraceOne}

      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OpenTelemetry__Endpoint: http://otel-collector:4317
      Telemetry__ObservabilityProvider__Provider: ClickHouse
      Telemetry__ObservabilityProvider__ClickHouse__Enabled: "true"
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: http://clickhouse:8123
      Analytics__ConnectionString: http://clickhouse:8123

      NEXTRACE_SKIP_INTEGRITY: ${NEXTRACE_SKIP_INTEGRITY:-false}
    ports:
      - "${INGESTION_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nextraceone-net

  # ── Ollama (servidor de modelos locais — AI-Runtime) ────────────────────────
  # Containerizado para desenvolvimento local. Em produção, usar servidor dedicado com GPU.
  # Modelos são persistidos em volume para evitar download repetido.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "2"
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nextraceone-net

  # ── Qdrant (vector database — AI Knowledge RAG)
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__HTTP_PORT: "6333"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - nextraceone-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_INGESTION_URL: ${VITE_INGESTION_URL:-http://localhost:8082}
    image: nextraceone/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      apihost:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nextraceone-net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  clickhouse-data:
    driver: local
  ollama-data:
    driver: local
  qdrant-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  nextraceone-net:
    driver: bridge
