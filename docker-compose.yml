# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Docker Compose (Aplicação Completa)
#
# Stack mínima para desenvolvimento local e staging:
#   - PostgreSQL (4 bancos lógicos)
#   - ClickHouse (observabilidade — provider configurável)
#   - OpenTelemetry Collector (pipeline de ingestão — modo de coleta configurável)
#   - ApiHost (API principal)
#   - BackgroundWorkers (jobs assíncronos)
#   - Ingestion.Api (integrações externas)
#   - Frontend (React SPA via nginx)
#
# Providers suportados: ClickHouse (default local) ou Elastic (enterprise externo)
# Modos de coleta: OpenTelemetry Collector (Kubernetes) ou CLR Profiler (IIS/Windows)
#
# Uso:
#   cp .env.example .env && nano .env   # Configurar variáveis
#   docker compose up -d                # Subir stack completa
#   docker compose down -v              # Parar e remover volumes
#
# Para desenvolvimento local (com override):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextraceone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextraceone}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nextraceone-net

  # ── ClickHouse (observabilidade — provider padrão) ─────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: nextraceone_obs
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./build/clickhouse/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql:ro
    ports:
      - "8123:8123"    # HTTP interface
      - "9000:9000"    # Native protocol
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nextraceone-net

  # ── OpenTelemetry Collector ─────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./build/otel-collector/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # Prometheus metrics
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - nextraceone-net

  # ── ApiHost ─────────────────────────────────────────────────────────────────
  apihost:
    build:
      context: .
      dockerfile: Dockerfile.apihost
    image: nextraceone/apihost:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Staging}
      ASPNETCORE_URLS: http://+:8080

      # Connection strings (4 bancos lógicos)
      ConnectionStrings__IdentityDatabase: ${CONNECTION_STRING_IDENTITY:?CONNECTION_STRING_IDENTITY is required}
      ConnectionStrings__CatalogDatabase: ${CONNECTION_STRING_CATALOG:?CONNECTION_STRING_CATALOG is required}
      ConnectionStrings__NexTraceOne: ${CONNECTION_STRING_OPERATIONS:?CONNECTION_STRING_OPERATIONS is required}
      ConnectionStrings__AiDatabase: ${CONNECTION_STRING_AI:?CONNECTION_STRING_AI is required}

      # JWT
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: ${JWT_ISSUER:-NexTraceOne}
      Jwt__Audience: ${JWT_AUDIENCE:-NexTraceOne}

      # Migrations (apenas Staging com consentimento explícito)
      NEXTRACE_AUTO_MIGRATE: ${NEXTRACE_AUTO_MIGRATE:-false}

      # Observability
      OpenTelemetry__Endpoint: http://otel-collector:4317
      Telemetry__ObservabilityProvider__Provider: ${OBSERVABILITY_PROVIDER:-ClickHouse}
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: "Host=clickhouse;Port=8123;Database=nextraceone_obs;Username=default;Password=${CLICKHOUSE_PASSWORD:-}"
      Telemetry__CollectionMode__ActiveMode: ${COLLECTION_MODE:-OpenTelemetryCollector}

      # Integrity check (desabilitar apenas em CI)
      NEXTRACE_SKIP_INTEGRITY: ${NEXTRACE_SKIP_INTEGRITY:-false}

      # CORS
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "${APIHOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - nextraceone-net

  # ── BackgroundWorkers ────────────────────────────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: Dockerfile.workers
    image: nextraceone/workers:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Staging}
      ASPNETCORE_URLS: http://+:8081

      ConnectionStrings__IdentityDatabase: ${CONNECTION_STRING_IDENTITY:?CONNECTION_STRING_IDENTITY is required}
      ConnectionStrings__NexTraceOne: ${CONNECTION_STRING_OPERATIONS:?CONNECTION_STRING_OPERATIONS is required}

      OpenTelemetry__Endpoint: http://otel-collector:4317
      Telemetry__ObservabilityProvider__Provider: ${OBSERVABILITY_PROVIDER:-ClickHouse}
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: "Host=clickhouse;Port=8123;Database=nextraceone_obs;Username=default;Password=${CLICKHOUSE_PASSWORD:-}"

      NEXTRACE_SKIP_INTEGRITY: ${NEXTRACE_SKIP_INTEGRITY:-false}
    ports:
      - "${WORKERS_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      apihost:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - nextraceone-net

  # ── Ingestion API ────────────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    image: nextraceone/ingestion:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Staging}
      ASPNETCORE_URLS: http://+:8082

      ConnectionStrings__NexTraceOne: ${CONNECTION_STRING_OPERATIONS:?CONNECTION_STRING_OPERATIONS is required}

      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: ${JWT_ISSUER:-NexTraceOne}
      Jwt__Audience: ${JWT_AUDIENCE:-NexTraceOne}

      OpenTelemetry__Endpoint: http://otel-collector:4317
      Telemetry__ObservabilityProvider__Provider: ${OBSERVABILITY_PROVIDER:-ClickHouse}
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: "Host=clickhouse;Port=8123;Database=nextraceone_obs;Username=default;Password=${CLICKHOUSE_PASSWORD:-}"

      NEXTRACE_SKIP_INTEGRITY: ${NEXTRACE_SKIP_INTEGRITY:-false}
    ports:
      - "${INGESTION_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - nextraceone-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_INGESTION_URL: ${VITE_INGESTION_URL:-http://localhost:8082}
    image: nextraceone/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      apihost:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nextraceone-net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  clickhouse-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  nextraceone-net:
    driver: bridge
