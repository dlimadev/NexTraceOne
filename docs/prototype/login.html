<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>NexTraceOne — Login</title>
<link rel="stylesheet" href="styles.css">
<style>
body { background: var(--deep); display:flex; align-items:center; justify-content:center; min-height:100vh; }
.auth-shell {
  width: 100%; max-width: 440px; padding: 20px;
}
.auth-logo { text-align: center; margin-bottom: 36px; }
.auth-logo-mark { display: inline-flex; align-items: center; gap: 12px; }
.auth-logo svg { width: 44px; height: 44px; }
.auth-logo .name { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; }
.auth-logo .name .nex   { color: #2BB7E3; }
.auth-logo .name .trace { color: #F2F7FF; }
.auth-logo .name .one   { color: #1EF2C1; }
.auth-card {
  background: var(--panel);
  border: 1px solid var(--border-md);
  border-radius: var(--r-lg);
  padding: 36px;
  box-shadow: var(--shadow-lg);
}
.auth-heading { font-size: 20px; font-weight: 700; color: var(--txt); margin-bottom: 4px; }
.auth-sub     { font-size: 13.5px; color: var(--txt-3); margin-bottom: 28px; }
.form-group   { margin-bottom: 16px; }
label { display: block; font-size: 12px; font-weight: 600; color: var(--txt-3); margin-bottom: 6px; letter-spacing: 0.02em; }
.input {
  width: 100%; padding: 10px 14px; border-radius: var(--r-sm);
  background: var(--input); border: 1px solid var(--border-md);
  color: var(--txt); font-size: 14px; font-family: var(--font);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.input::placeholder { color: var(--txt-muted); }
.input:focus { border-color: var(--cyan); box-shadow: var(--glow-cyan); }
.input-row { display: flex; gap: 10px; }
.form-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--txt-3); cursor: pointer; }
.checkbox-row input { accent-color: var(--cyan); width: 14px; height: 14px; }
.link-sm { font-size: 13px; color: var(--cyan); }
.btn-auth {
  width: 100%; padding: 11px; background: linear-gradient(135deg, #2BB7E3, #18CFF2);
  color: #04111E; font-size: 14px; font-weight: 700; border: none;
  border-radius: var(--r-sm); cursor: pointer; font-family: var(--font);
  transition: opacity .15s; letter-spacing: 0.01em;
}
.btn-auth:hover { opacity: .9; }
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider-line { flex: 1; height: 1px; background: var(--border); }
.divider-text { font-size: 12px; color: var(--txt-muted); }
.sso-btn {
  width: 100%; padding: 10px; background: var(--elevated);
  border: 1px solid var(--border-md); border-radius: var(--r-sm);
  color: var(--txt-2); font-size: 13.5px; font-weight: 500;
  cursor: pointer; font-family: var(--font); transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.sso-btn:hover { border-color: var(--border-hi); color: var(--txt); background: var(--panel); }
.auth-footer { text-align:center; margin-top: 20px; font-size: 12px; color: var(--txt-muted); }
.auth-footer a { color: var(--cyan); }
/* Tenant badge */
.tenant-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(24,207,242,.1); border: 1px solid rgba(24,207,242,.25);
  border-radius: var(--r-xl); padding: 4px 12px 4px 8px;
  font-size: 12px; color: var(--cyan); margin-bottom: 20px;
}
.tenant-badge .dot { background: var(--cyan); width: 6px; height: 6px; }
/* MFA step (hidden by default for demo) */
.mfa-hint { text-align:center; font-size:13px; color:var(--txt-3); margin-top:10px; }
.back-link { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--txt-muted); margin-bottom:28px; cursor:pointer; }
.back-link:hover { color:var(--txt); }
</style>
</head>
<body>
<div class="auth-shell">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-mark">
      <svg viewBox="0 0 160 160" fill="none">
        <defs>
          <linearGradient id="lg" x1="20" y1="140" x2="140" y2="20" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#18E8B8"/>
          </linearGradient>
        </defs>
        <circle cx="80" cy="80" r="67" stroke="url(#lg)" stroke-width="1.5"/>
        <ellipse cx="80" cy="80" rx="67" ry="22" stroke="url(#lg)" stroke-width="1" opacity=".4"/>
        <path d="M80 13 Q50 80 80 147M80 13 Q110 80 80 147" stroke="url(#lg)" stroke-width="1" fill="none" opacity=".4"/>
        <path d="M80 13 Q115 22 143 47" stroke="url(#lg)" stroke-width="1.8" fill="none"/>
        <circle cx="143" cy="47" r="5" fill="#18E8B8"/>
        <rect x="54" y="52" width="14" height="56" rx="3.5" fill="url(#lg)"/>
        <polygon points="68,52 82,52 92,108 78,108" fill="url(#lg)"/>
        <rect x="92" y="52" width="14" height="56" rx="3.5" fill="url(#lg)"/>
      </svg>
      <div class="name"><span class="nex">Nex</span><span class="trace">Trace</span><span class="one">One</span></div>
    </div>
  </div>

  <div class="auth-card">
    <div class="tenant-badge">
      <span class="dot" style="border-radius:50%;display:inline-block"></span>
      acme-corp.nextrace.io
    </div>

    <div class="auth-heading">Bem-vindo de volta</div>
    <div class="auth-sub">Entre com suas credenciais corporativas para continuar.</div>

    <div class="form-group">
      <label>E-mail corporativo</label>
      <input class="input" type="email" placeholder="voce@empresa.com" value="admin@acme-corp.io">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input class="input" type="password" placeholder="••••••••••" value="••••••••••">
    </div>

    <div class="form-row">
      <label class="checkbox-row">
        <input type="checkbox" checked> Manter conectado
      </label>
      <a href="#" class="link-sm">Esqueci a senha</a>
    </div>

    <button class="btn-auth">Entrar na plataforma</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">ou</span>
      <div class="divider-line"></div>
    </div>

    <button class="sso-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Entrar com SSO / SAML
    </button>
  </div>

  <div class="auth-footer">
    <a href="index.html">← Voltar ao Brand Guide</a>
    &nbsp;·&nbsp;
    <a href="dashboard.html">Ver Dashboard →</a>
  </div>
</div>
</body>
</html>
