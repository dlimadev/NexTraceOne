# ═══════════════════════════════════════════════════════════════════════════════
# Grafana Tempo — Configuração para NexTraceOne Telemetry Store (Traces)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Armazena traces crus com retenção configurável.
# Os traces NÃO vão para PostgreSQL — ficam em storage local ou object storage.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

compactor:
  compaction:
    block_retention: 720h  # 30 dias de retenção em hot

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
