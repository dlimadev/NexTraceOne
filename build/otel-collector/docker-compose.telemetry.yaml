# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Docker Compose para stack de observabilidade
# ═══════════════════════════════════════════════════════════════════════════════
#
# Stack para desenvolvimento e POC:
# - OpenTelemetry Collector (pipeline central de ingestão)
# - ClickHouse (provider de observabilidade — traces, logs e métricas crus)
#
# O PostgreSQL do produto (Product Store) é externo a este compose.
# Métricas agregadas são escritas no PostgreSQL pelo application layer,
# não diretamente pelo Collector.
#
# Provider: ClickHouse é o provider padrão para desenvolvimento local.
# Para Elastic: substituir ClickHouse por integração com stack Elastic existente.
#
# Coleta: OpenTelemetry Collector é o modo padrão (Kubernetes).
# Para IIS: CLR Profiler envia dados via OTLP HTTP para este Collector.
#
# USO:
# docker compose -f build/otel-collector/docker-compose.telemetry.yaml up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── ClickHouse (Observability Provider) ──────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: nextraceone-clickhouse
    environment:
      CLICKHOUSE_DB: nextraceone_obs
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../clickhouse/init-schema.sql:/docker-entrypoint-initdb.d/01-init-schema.sql:ro
      - ../clickhouse/analytics-schema.sql:/docker-entrypoint-initdb.d/02-analytics-schema.sql:ro
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - nextraceone-telemetry

  # ── OpenTelemetry Collector ──────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    container_name: nextraceone-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics (Collector self-monitoring)
      - "13133:13133" # Health check
    environment:
      - CLICKHOUSE_ENDPOINT=tcp://clickhouse:9000?database=nextraceone_obs
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - nextraceone-telemetry

volumes:
  clickhouse-data:

networks:
  nextraceone-telemetry:
    name: nextraceone-telemetry
