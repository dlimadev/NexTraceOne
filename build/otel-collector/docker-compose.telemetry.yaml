# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Docker Compose para stack de observabilidade
# ═══════════════════════════════════════════════════════════════════════════════
#
# Stack para desenvolvimento e POC:
# - OpenTelemetry Collector (pipeline central de ingestão)
# - Elasticsearch (provider de observabilidade — traces, logs e métricas crus)
#
# O PostgreSQL do produto (Product Store) é externo a este compose.
# Métricas agregadas são escritas no PostgreSQL pelo application layer,
# não diretamente pelo Collector.
#
# Provider: Elasticsearch é o provider padrão para desenvolvimento local.
# Para ClickHouse: substituir Elasticsearch pelo ClickHouse como alternativa.
#
# Coleta: OpenTelemetry Collector é o modo padrão (Kubernetes).
# Para IIS: CLR Profiler envia dados via OTLP HTTP para este Collector.
#
# USO:
# docker compose -f build/otel-collector/docker-compose.telemetry.yaml up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Elasticsearch (Observability Provider) ───────────────────────────
  # AVISO: xpack.security.enabled=false é apenas para desenvolvimento local.
  # Em produção, ativar segurança (TLS, autenticação, API keys).
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: nextraceone-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"   # APENAS para dev local — ativar em produção
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"   # REST API
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - nextraceone-telemetry

  # ── OpenTelemetry Collector ──────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    container_name: nextraceone-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics (Collector self-monitoring)
      - "13133:13133" # Health check
    environment:
      - ELASTICSEARCH_ENDPOINT=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - nextraceone-telemetry

volumes:
  elasticsearch-data:

networks:
  nextraceone-telemetry:
    name: nextraceone-telemetry
