# ═══════════════════════════════════════════════════════════════════════════════
# Grafana Loki — Configuração para NexTraceOne Telemetry Store (Logs)
# ═══════════════════════════════════════════════════════════════════════════════
#
# Armazena logs crus com retenção configurável.
# Os logs NÃO vão para PostgreSQL — ficam em storage local ou object storage.

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /var/loki
  storage:
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

limits_config:
  retention_period: 720h  # 30 dias de retenção em hot
  max_query_length: 720h
  reject_old_samples: true
  reject_old_samples_max_age: 168h

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /var/loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
