{{- if .Values.monitoring.prometheusRules.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "nextraceone.fullname" . }}
  labels:
    {{- include "nextraceone.labels" . | nindent 4 }}
    release: prometheus
spec:
  groups:
    - name: nextraceone.rules
      rules:
        # High error rate alert
        - alert: NexTraceOneHighErrorRate
          expr: sum(rate(http_requests_total{job="{{ include "nextraceone.fullname" . }}",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="{{ include "nextraceone.fullname" . }}"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate detected"
            description: "More than 5% of requests are failing with 5xx status codes"

        # High latency alert
        - alert: NexTraceOneHighLatency
          expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job="{{ include "nextraceone.fullname" . }}"}[5m])) by (le)) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High latency detected"
            description: "95th percentile latency is above 1 second"

        # Pod crash loop alert
        - alert: NexTraceOnePodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}",pod=~"{{ include "nextraceone.fullname" . }}.*"}[1h]) > 5
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Pod is crash looping"
            description: "Pod has restarted more than 5 times in the last hour"

        # Low available replicas alert
        - alert: NexTraceOneLowAvailableReplicas
          expr: kube_deployment_status_replicas_available{deployment="{{ include "nextraceone.fullname" . }}",namespace="{{ .Release.Namespace }}"} < {{ .Values.autoscaling.minReplicas }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Low number of available replicas"
            description: "Less than {{ .Values.autoscaling.minReplicas }} replicas are available"

        # Database connection pool exhaustion
        - alert: NexTraceOneDatabasePoolExhaustion
          expr: pg_stat_activity_count{datname="nextraceone"} / pg_settings_max_connections > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Database connection pool nearly exhausted"
            description: "More than 90% of database connections are in use"

        # Elasticsearch cluster health
        - alert: NexTraceOneElasticsearchClusterRed
          expr: elasticsearch_cluster_health_status{color="red"} == 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Elasticsearch cluster is red"
            description: "Elasticsearch cluster health is red - some shards are unassigned"
{{- end }}
