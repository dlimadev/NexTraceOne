apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextraceone.fullname" . }}-db-secrets
  labels:
    {{- include "nextraceone.labels" . | nindent 4 }}
type: Opaque
data:
  # Database connection strings (base64 encoded)
  identity-connection-string: {{ .Values.app.connectionStrings.identityDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_identity;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  catalog-connection-string: {{ .Values.app.connectionStrings.catalogDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_catalog;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  governance-connection-string: {{ .Values.app.connectionStrings.governanceDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_governance;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  notifications-connection-string: {{ .Values.app.connectionStrings.notificationsDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_notifications;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  integrations-connection-string: {{ .Values.app.connectionStrings.integrationsDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_integrations;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  audit-connection-string: {{ .Values.app.connectionStrings.auditDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_audit;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  configuration-connection-string: {{ .Values.app.connectionStrings.configurationDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_configuration;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  operational-intelligence-connection-string: {{ .Values.app.connectionStrings.operationalIntelligenceDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_operational;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  change-governance-connection-string: {{ .Values.app.connectionStrings.changeGovernanceDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_change;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  ai-knowledge-connection-string: {{ .Values.app.connectionStrings.aiKnowledgeDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_ai;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
  finops-connection-string: {{ .Values.app.connectionStrings.finopsDatabase | default (printf "Host=%s-postgresql;Port=5432;Database=nextraceone_finops;Username=%s;Password=%s" (include "nextraceone.fullname" .) .Values.postgresql.auth.username .Values.postgresql.auth.password) | b64enc | quote }}
