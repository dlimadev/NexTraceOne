apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nextraceone.serviceAccountName" . }}
  labels:
    {{- include "nextraceone.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
