<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <!--
      CSP defense-in-depth: restringe fontes de conteúdo executável.
      Em produção, o proxy/servidor deve definir o CSP via header HTTP (mais seguro).
      Este meta tag funciona como fallback e proteção durante desenvolvimento.
      Nota: connect-src 'self' permite comunicação com a API no mesmo domínio.
      Fontes servidas localmente via @fontsource (Inter + JetBrains Mono) —
      sem dependência de CDN externo. Funciona em ambientes on-premise isolados.
    -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>NexTraceOne — Change Intelligence Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
