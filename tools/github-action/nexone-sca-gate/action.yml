name: "NexOne SCA Gate"
description: "Fails the workflow when a service's dependency vulnerabilities exceed an allowed count at or above a severity threshold (data from NexTraceOne dependency governance)."
branding:
  icon: "shield"
  color: "red"

inputs:
  service-id:
    description: "Service identifier (GUID) to evaluate."
    required: true
  api-url:
    description: "NexTraceOne API base URL."
    required: true
  api-token:
    description: "API authentication token (Bearer)."
    required: true
  fail-on:
    description: "Minimum severity counted towards the gate: low | medium | high | critical."
    required: false
    default: "high"
  max-allowed:
    description: "Maximum number of vulnerabilities (at or above 'fail-on') allowed before failing."
    required: false
    default: "0"
  timeout-seconds:
    description: "Timeout in seconds for each API call."
    required: false
    default: "30"
  max-retries:
    description: "Number of retries on transient failures (5xx / timeout)."
    required: false
    default: "3"

outputs:
  health-score:
    description: "The dependency health score (0-100)."
    value: ${{ steps.check.outputs.health_score }}
  offending-count:
    description: "Number of vulnerabilities at or above the configured severity."
    value: ${{ steps.check.outputs.offending_count }}

runs:
  using: "composite"
  steps:
    - name: Check dependency vulnerabilities
      id: check
      shell: bash
      env:
        SERVICE_ID: ${{ inputs.service-id }}
        API_URL: ${{ inputs.api-url }}
        API_TOKEN: ${{ inputs.api-token }}
        FAIL_ON: ${{ inputs.fail-on }}
        MAX_ALLOWED: ${{ inputs.max-allowed }}
        TIMEOUT: ${{ inputs.timeout-seconds }}
        MAX_RETRIES: ${{ inputs.max-retries }}
      run: |
        set -euo pipefail

        if ! command -v jq &> /dev/null; then
          echo "::error::jq is required but not installed. Add a step to install jq before using this action."
          exit 1
        fi

        case "${FAIL_ON,,}" in
          low|medium|high|critical) ;;
          *) echo "::error::Invalid fail-on '${FAIL_ON}'. Use: low | medium | high | critical."; exit 1 ;;
        esac

        SID_ENC=$(jq -rn --arg v "${SERVICE_ID}" '$v|@uri')

        attempt=0
        while true; do
          RESPONSE=$(curl -sf --max-time "${TIMEOUT}" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Accept: application/json" \
            "${API_URL%/}/api/v1/catalog/dependencies/${SID_ENC}/health") && break

          attempt=$((attempt + 1))
          if [ "$attempt" -ge "$MAX_RETRIES" ]; then
            echo "::error::Failed to reach NexTraceOne API at ${API_URL} after ${MAX_RETRIES} attempts."
            exit 1
          fi
          echo "::warning::API request failed (attempt ${attempt}). Retrying..."
          sleep $((2 ** attempt))
        done

        SCORE=$(echo "$RESPONSE" | jq -r '.healthScore // 0')
        CRIT=$(echo "$RESPONSE" | jq -r '.criticalVulnCount // 0')
        HIGH=$(echo "$RESPONSE" | jq -r '.highVulnCount // 0')
        MED=$(echo "$RESPONSE" | jq -r '.mediumVulnCount // 0')
        LOW=$(echo "$RESPONSE" | jq -r '.lowVulnCount // 0')

        case "${FAIL_ON,,}" in
          critical) OFFENDING=$((CRIT)) ;;
          high)     OFFENDING=$((CRIT + HIGH)) ;;
          medium)   OFFENDING=$((CRIT + HIGH + MED)) ;;
          low)      OFFENDING=$((CRIT + HIGH + MED + LOW)) ;;
        esac

        echo "health_score=${SCORE}" >> "$GITHUB_OUTPUT"
        echo "offending_count=${OFFENDING}" >> "$GITHUB_OUTPUT"

        echo "::notice::Service ${SERVICE_ID} — health=${SCORE}; vulns at/above ${FAIL_ON}: ${OFFENDING} (critical=${CRIT}, high=${HIGH}, medium=${MED}, low=${LOW})."

        if [ "$OFFENDING" -gt "$MAX_ALLOWED" ]; then
          echo "::error::SCA gate failed: ${OFFENDING} vulnerability(ies) at or above '${FAIL_ON}' exceed the allowed maximum (${MAX_ALLOWED})."
          exit 1
        fi

        echo "::notice::SCA gate passed: ${OFFENDING} <= ${MAX_ALLOWED} (threshold '${FAIL_ON}')."
