name: "NexOne Change Confidence Gate"
description: "Fails the workflow if the change confidence score for a release is below the configured threshold."

inputs:
  release-id:
    description: "Release identifier to check confidence score for."
    required: true
  api-url:
    description: "NexTraceOne API base URL."
    required: true
  api-token:
    description: "API authentication token (Bearer)."
    required: true
  min-confidence-score:
    description: "Minimum acceptable confidence score (0–100). Workflow fails if score is below this value."
    required: false
    default: "70"
  timeout-seconds:
    description: "Timeout in seconds for each API call."
    required: false
    default: "30"
  max-retries:
    description: "Number of retries on transient failures (5xx / timeout)."
    required: false
    default: "3"

outputs:
  score:
    description: "The confidence score returned by the API."
    value: ${{ steps.check.outputs.score }}
  tier:
    description: "The confidence tier returned by the API."
    value: ${{ steps.check.outputs.tier }}

runs:
  using: "composite"
  steps:
    - name: Check change confidence score
      id: check
      shell: bash
      env:
        RELEASE_ID: ${{ inputs.release-id }}
        API_URL: ${{ inputs.api-url }}
        API_TOKEN: ${{ inputs.api-token }}
        MIN_SCORE: ${{ inputs.min-confidence-score }}
        TIMEOUT: ${{ inputs.timeout-seconds }}
        MAX_RETRIES: ${{ inputs.max-retries }}
      run: |
        set -euo pipefail

        if ! command -v jq &> /dev/null; then
          echo "::error::jq is required but not installed. Add a step to install jq before using this action."
          exit 1
        fi

        attempt=0
        while true; do
          RESPONSE=$(curl -sf --max-time "${TIMEOUT}" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Accept: application/json" \
            "${API_URL%/}/api/v1/changes/${RELEASE_ID}/confidence") && break

          attempt=$((attempt + 1))
          if [ "$attempt" -ge "$MAX_RETRIES" ]; then
            echo "::error::Failed to reach NexTraceOne API at ${API_URL} after ${MAX_RETRIES} attempts."
            exit 1
          fi
          echo "::warning::API request failed (attempt ${attempt}). Retrying..."
          sleep $((2 ** attempt))
        done

        SCORE=$(echo "$RESPONSE" | jq -r '.score // empty')
        TIER=$(echo "$RESPONSE" | jq -r '.tier // empty')

        if [ -z "$SCORE" ]; then
          echo "::error::Could not parse confidence score from API response."
          echo "Response: $RESPONSE"
          exit 1
        fi

        echo "score=${SCORE}" >> "$GITHUB_OUTPUT"
        echo "tier=${TIER}" >> "$GITHUB_OUTPUT"

        echo "::notice::Change confidence score for release '${RELEASE_ID}': ${SCORE} (${TIER})"

        BELOW=$(awk -v score="$SCORE" -v min="$MIN_SCORE" 'BEGIN { print (score + 0 < min + 0) ? "yes" : "no" }')
        if [ "$BELOW" = "yes" ]; then
          echo "::error::Confidence score ${SCORE} is below minimum threshold ${MIN_SCORE}. Blocking promotion."
          exit 1
        fi

        echo "::notice::Confidence gate passed: ${SCORE} >= ${MIN_SCORE}"
