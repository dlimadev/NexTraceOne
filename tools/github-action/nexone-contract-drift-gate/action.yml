name: "NexOne Contract Drift Gate"
description: "Fails the workflow when a contract change introduces breaking changes, based on NexTraceOne's semantic contract diff."
branding:
  icon: "git-pull-request"
  color: "purple"

inputs:
  from-contract-id:
    description: "Base contract version identifier (the 'from' side of the diff)."
    required: true
  to-contract-id:
    description: "Target contract version identifier (the 'to' side of the diff)."
    required: true
  api-url:
    description: "NexTraceOne API base URL."
    required: true
  api-token:
    description: "API authentication token (Bearer)."
    required: true
  fail-on-breaking:
    description: "Fail the workflow when breaking changes are detected."
    required: false
    default: "true"
  timeout-seconds:
    description: "Timeout in seconds for each API call."
    required: false
    default: "30"
  max-retries:
    description: "Number of retries on transient failures (5xx / timeout)."
    required: false
    default: "3"

outputs:
  has-breaking-changes:
    description: "Whether the diff contains breaking changes (true/false)."
    value: ${{ steps.check.outputs.has_breaking_changes }}
  summary:
    description: "Human-readable summary of the contract diff."
    value: ${{ steps.check.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Check contract drift
      id: check
      shell: bash
      env:
        FROM_ID: ${{ inputs.from-contract-id }}
        TO_ID: ${{ inputs.to-contract-id }}
        API_URL: ${{ inputs.api-url }}
        API_TOKEN: ${{ inputs.api-token }}
        FAIL_ON_BREAKING: ${{ inputs.fail-on-breaking }}
        TIMEOUT: ${{ inputs.timeout-seconds }}
        MAX_RETRIES: ${{ inputs.max-retries }}
      run: |
        set -euo pipefail

        if ! command -v jq &> /dev/null; then
          echo "::error::jq is required but not installed. Add a step to install jq before using this action."
          exit 1
        fi

        # URL-encode the ids defensively (they are usually GUIDs, but stay safe).
        encode() { jq -rn --arg v "$1" '$v|@uri'; }
        FROM_ENC=$(encode "${FROM_ID}")
        TO_ENC=$(encode "${TO_ID}")

        attempt=0
        while true; do
          RESPONSE=$(curl -sf --max-time "${TIMEOUT}" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Accept: application/json" \
            "${API_URL%/}/api/v1/contracts/diff?from=${FROM_ENC}&to=${TO_ENC}") && break

          attempt=$((attempt + 1))
          if [ "$attempt" -ge "$MAX_RETRIES" ]; then
            echo "::error::Failed to reach NexTraceOne API at ${API_URL} after ${MAX_RETRIES} attempts."
            exit 1
          fi
          echo "::warning::API request failed (attempt ${attempt}). Retrying..."
          sleep $((2 ** attempt))
        done

        BREAKING=$(echo "$RESPONSE" | jq -r '.hasBreakingChanges // false')
        SUMMARY=$(echo "$RESPONSE" | jq -r '.summary // ""')

        echo "has_breaking_changes=${BREAKING}" >> "$GITHUB_OUTPUT"
        # Summaries can be multi-line; emit safely.
        {
          echo "summary<<__NEXONE_EOF__"
          echo "${SUMMARY}"
          echo "__NEXONE_EOF__"
        } >> "$GITHUB_OUTPUT"

        if [ -n "$SUMMARY" ]; then
          echo "::notice::Contract diff (${FROM_ID} → ${TO_ID}): ${SUMMARY}"
        fi

        if [ "$BREAKING" = "true" ]; then
          if [ "$FAIL_ON_BREAKING" = "true" ]; then
            echo "::error::Breaking changes detected in contract diff (${FROM_ID} → ${TO_ID}). Blocking."
            exit 1
          fi
          echo "::warning::Breaking changes detected, but fail-on-breaking is disabled. Not blocking."
        else
          echo "::notice::No breaking changes detected (${FROM_ID} → ${TO_ID})."
        fi
