# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — CI Pipeline
#
# Trigger: push para main/develop + pull_request
# Jobs:
#   validate       → quality gate (anti-demo check)
#   build-backend  → dotnet restore + build
#   test-backend   → dotnet test (unit + integration)
#   build-frontend → npm ci + tsc + vite build
#   test-frontend  → vitest run
# ═══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip

jobs:

  # ── validate ────────────────────────────────────────────────────────────────
  validate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Anti-demo guardrail
        run: bash scripts/quality/check-no-demo-artifacts.sh

      - name: Setup Node.js (i18n check)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: i18n coverage check
        run: node scripts/quality/check-i18n-coverage.sh

  # ── build-backend ────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore NexTraceOne.sln

      - name: Build
        run: dotnet build NexTraceOne.sln --configuration Release --no-restore

  # ── test-backend-unit ────────────────────────────────────────────────────────
  test-backend-unit:
    name: Test Backend (Unit)
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore NexTraceOne.sln

      - name: Run unit tests
        run: |
          dotnet test NexTraceOne.sln \
            --configuration Release \
            --no-restore \
            --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~E2E" \
            --logger "trx;LogFileName=unit-test-results.trx" \
            --results-directory ./test-results \
            --collect:"XPlat Code Coverage" \
            --verbosity normal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./test-results/*.trx

      - name: Generate coverage report
        if: success()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool 2>/dev/null || true
          reportgenerator \
            -reports:"./test-results/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:"Cobertura;TextSummary"
          echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
          cat ./coverage-report/Summary.txt >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: ./coverage-report/
          retention-days: 30

  # ── test-backend-integration ─────────────────────────────────────────────────
  test-backend-integration:
    name: Test Backend (Integration)
    runs-on: ubuntu-latest
    needs: build-backend
    # Integration tests require PostgreSQL
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nextraceone_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Integration test databases (Testcontainers handles its own — these are fallbacks)
      NEXTRACE_IT_IDENTITY_CONN: "Host=localhost;Port=5432;Database=nextrace_it_identity;Username=nextraceone_test;Password=test_password"
      NEXTRACE_IT_CATALOG_CONN: "Host=localhost;Port=5432;Database=nextrace_it_catalog;Username=nextraceone_test;Password=test_password"
      NEXTRACE_IT_OPERATIONS_CONN: "Host=localhost;Port=5432;Database=nextrace_it_operations;Username=nextraceone_test;Password=test_password"
      NEXTRACE_IT_AI_CONN: "Host=localhost;Port=5432;Database=nextrace_it_ai;Username=nextraceone_test;Password=test_password"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore NexTraceOne.sln

      - name: Run integration tests
        run: |
          dotnet test tests/platform/NexTraceOne.IntegrationTests/NexTraceOne.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --results-directory ./test-results \
            --verbosity normal
        continue-on-error: false

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./test-results/*.trx

  # ── test-backend-e2e ──────────────────────────────────────────────────────────
  test-backend-e2e:
    name: Test Backend (E2E)
    runs-on: ubuntu-latest
    needs: build-backend
    # E2E tests spin up the full ApiHost via WebApplicationFactory + Testcontainers PostgreSQL
    env:
      ASPNETCORE_ENVIRONMENT: Development
      NEXTRACE_SKIP_INTEGRITY: "true"
      NEXTRACE_IGNORE_PENDING_MODEL_CHANGES: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore NexTraceOne.sln

      - name: Run E2E backend tests
        run: |
          dotnet test tests/platform/NexTraceOne.E2E.Tests/NexTraceOne.E2E.Tests.csproj \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=e2e-backend-test-results.trx" \
            --results-directory ./test-results \
            --verbosity normal
        continue-on-error: false

      - name: Upload E2E backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-backend-test-results
          path: ./test-results/*.trx

  # ── build-frontend ───────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_INGESTION_URL: http://localhost:8082

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist/
          retention-days: 7

  # ── test-frontend ────────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: src/frontend/test-results/

      - name: Upload frontend coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: src/frontend/coverage/
          retention-days: 30

  # ── e2e-smoke ─────────────────────────────────────────────────────────────
  # Runs @smoke-tagged Playwright E2E tests as a required quality gate.
  # Full E2E suite runs nightly via the separate e2e.yml workflow.
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend for preview
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080
          VITE_INGESTION_URL: http://localhost:8082

      - name: Run E2E smoke tests
        run: npx playwright test --grep "@smoke" --reporter=html
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-report
          path: src/frontend/playwright-report/
          retention-days: 7

  # ── security-audit ────────────────────────────────────────────────────────────
  security-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: NuGet vulnerability audit
        run: |
          echo "## NuGet Vulnerability Audit" >> $GITHUB_STEP_SUMMARY
          dotnet restore NexTraceOne.sln
          # --vulnerable flag lists packages with known vulnerabilities
          set +e
          AUDIT_OUTPUT=$(dotnet list NexTraceOne.sln package --vulnerable --include-transitive 2>&1)
          AUDIT_EXIT=$?
          set -e
          echo "$AUDIT_OUTPUT"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$AUDIT_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Fail on critical/high severity vulnerabilities (check output for severity markers)
          if echo "$AUDIT_OUTPUT" | grep -qE "(Critical|High)\s"; then
            echo "❌ Critical or high severity vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ No critical/high NuGet vulnerabilities" >> $GITHUB_STEP_SUMMARY

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: npm audit
        working-directory: src/frontend
        run: |
          echo "## npm Vulnerability Audit" >> $GITHUB_STEP_SUMMARY
          npm ci
          # Run audit once, capture output and exit code
          set +e
          AUDIT_OUTPUT=$(npm audit --omit=dev --audit-level=critical 2>&1)
          AUDIT_EXIT=$?
          set -e
          echo "$AUDIT_OUTPUT"
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$AUDIT_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "❌ Critical npm vulnerabilities found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ No critical npm vulnerabilities" >> $GITHUB_STEP_SUMMARY

  # ── ci-status ─────────────────────────────────────────────────────────────
  # Single required status check that gates PR merges to main/develop.
  # Aggregates all CI jobs into one check for branch protection rules.
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate
      - build-backend
      - test-backend-unit
      - test-backend-integration
      - test-backend-e2e
      - build-frontend
      - test-frontend
      - e2e-smoke
      - security-audit
    steps:
      - name: Check job results
        run: |
          echo "validate: ${{ needs.validate.result }}"
          echo "build-backend: ${{ needs.build-backend.result }}"
          echo "test-backend-unit: ${{ needs.test-backend-unit.result }}"
          echo "test-backend-integration: ${{ needs.test-backend-integration.result }}"
          echo "test-backend-e2e: ${{ needs.test-backend-e2e.result }}"
          echo "build-frontend: ${{ needs.build-frontend.result }}"
          echo "test-frontend: ${{ needs.test-frontend.result }}"
          echo "e2e-smoke: ${{ needs.e2e-smoke.result }}"
          echo "security-audit: ${{ needs.security-audit.result }}"

          # e2e-smoke is skipped on push events — only fail CI if it actually ran and failed
          if [[ "${{ needs.validate.result }}" == "failure" || \
                "${{ needs.build-backend.result }}" == "failure" || \
                "${{ needs.test-backend-unit.result }}" == "failure" || \
                "${{ needs.test-backend-integration.result }}" == "failure" || \
                "${{ needs.test-backend-e2e.result }}" == "failure" || \
                "${{ needs.build-frontend.result }}" == "failure" || \
                "${{ needs.test-frontend.result }}" == "failure" || \
                "${{ needs.security-audit.result }}" == "failure" || \
                ( "${{ github.event_name }}" == "pull_request" && "${{ needs.e2e-smoke.result }}" == "failure" ) ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          echo "✅ All required CI checks passed"
