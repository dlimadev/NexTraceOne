# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Security Scan Pipeline
#
# Trigger: push para main + pull_request + schedule semanal
# Jobs:
#   dependency-scan    → .NET NuGet dependency vulnerability scan
#   frontend-audit     → npm audit
#   codeql-analysis    → GitHub CodeQL para C# e JavaScript/TypeScript
#   docker-scan        → Trivy image scan (apenas em main)
# ═══════════════════════════════════════════════════════════════════════════════

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  schedule:
    # Executa às 02:00 UTC às segundas-feiras
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"

jobs:

  # ── dependency-scan (NuGet) ───────────────────────────────────────────────────
  dependency-scan:
    name: .NET Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore packages
        run: dotnet restore NexTraceOne.sln

      - name: Scan for vulnerable packages
        run: |
          dotnet list NexTraceOne.sln package --vulnerable --include-transitive 2>&1 | \
            tee /tmp/vuln-report.txt
          # Fail if any vulnerabilities found
          if grep -q "has the following vulnerable packages" /tmp/vuln-report.txt; then
            echo "::error::Vulnerable NuGet packages detected. Review /tmp/vuln-report.txt"
            cat /tmp/vuln-report.txt
            exit 1
          fi
          echo "No vulnerable packages found."

  # ── frontend-audit (npm) ──────────────────────────────────────────────────────
  frontend-audit:
    name: Frontend npm Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: false

  # ── codeql-analysis ───────────────────────────────────────────────────────────
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [csharp, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Setup .NET (for C# analysis)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build (for C# analysis)
        if: matrix.language == 'csharp'
        run: dotnet build NexTraceOne.sln --configuration Release

      - name: Setup Node.js (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies (for JS/TS analysis)
        if: matrix.language == 'javascript-typescript'
        run: npm ci
        working-directory: src/frontend

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ── docker-scan (apenas em main) ──────────────────────────────────────────────
  docker-scan:
    name: Docker Image Scan (Trivy)
    runs-on: ubuntu-latest
    # Only run on main branch pushes to avoid slow PR times
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.apihost
            image: nextraceone/apihost
          - dockerfile: Dockerfile.workers
            image: nextraceone/workers
          - dockerfile: Dockerfile.ingestion
            image: nextraceone/ingestion
          - dockerfile: Dockerfile.frontend
            image: nextraceone/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (needed for backend image builds)
        if: matrix.dockerfile != 'Dockerfile.frontend'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ matrix.dockerfile }} \
            -t ${{ matrix.image }}:scan \
            --build-arg NEXTRACE_SKIP_INTEGRITY=true \
            .
        env:
          DOCKER_BUILDKIT: "1"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ matrix.image }}:scan"
          format: "sarif"
          output: "trivy-results-${{ matrix.image }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results-${{ matrix.image }}.sarif"
          category: "trivy-${{ matrix.image }}"
