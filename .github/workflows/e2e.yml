# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — E2E Tests (Playwright)
#
# Trigger: schedule (nightly), manual dispatch e pull_request para main
# PRs para main executam apenas testes marcados com @smoke para não bloquear
# velocidade de entrega. Nightly executa a suíte completa.
# ═══════════════════════════════════════════════════════════════════════════════

name: E2E Tests

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  schedule:
    # Executa às 03:00 UTC todos os dias
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to run E2E against (default: local stack)"
        required: false
        default: "http://localhost:4173"
      grep:
        description: "Playwright --grep filter (empty = all tests)"
        required: false
        default: ""

env:
  NODE_VERSION: "22"
  DOTNET_VERSION: "10.0.x"

permissions:
  contents: read

jobs:

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: src/frontend
        run: npx playwright install --with-deps chromium

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build backend
        run: dotnet build NexTraceOne.sln --configuration Release

      - name: Start local stack (background)
        run: |
          cp .env.example .env
          sed -i 's/POSTGRES_PASSWORD=change-me-in-production/POSTGRES_PASSWORD=e2e_test_pass/' .env
          sed -i 's/JWT_SECRET=REPLACE-WITH-AT-LEAST-32-CHAR-SECRET-KEY/JWT_SECRET=E2E-Test-SecretKey-AtLeast32BytesLong-2024!/' .env
          sed -i 's/NEXTRACE_AUTO_MIGRATE=false/NEXTRACE_AUTO_MIGRATE=true/' .env
          sed -i 's/ASPNETCORE_ENVIRONMENT=Staging/ASPNETCORE_ENVIRONMENT=Development/' .env
          docker compose up -d postgres clickhouse otel-collector 2>&1 | tail -20
          echo "Waiting for infrastructure..."
          sleep 30

      - name: Run E2E tests
        working-directory: src/frontend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx playwright test --grep "@smoke" --reporter=html
          elif [ -n "${{ inputs.grep }}" ]; then
            npx playwright test --grep "${{ inputs.grep }}" --reporter=html
          else
            npx playwright test --reporter=html
          fi
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || 'http://localhost:4173' }}
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/frontend/playwright-report/
          retention-days: 14

      - name: Stop local stack
        if: always()
        run: docker compose down -v 2>/dev/null || true
