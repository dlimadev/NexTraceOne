# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Offline Release Bundle (W3-02)
#
# Trigger: tags v* (ex: v1.2.3)
# Produz: bundles auto-contidos linux-x64 e win-x64 para instalação on-premises
#         sem acesso à internet (dotnet publish --self-contained).
#
# Artefactos gerados por release:
#   nextraceone-linux-x64.tar.gz     — ApiHost, BackgroundWorkers, IngestionApi
#   nextraceone-windows-x64.zip      — ApiHost, BackgroundWorkers, IngestionApi
#   checksums.sha256                 — SHA-256 de todos os artefactos
#   upgrade.sh                       — script de upgrade para on-prem linux
# ═══════════════════════════════════════════════════════════════════════════════

name: Release Bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: read

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip
  BUNDLE_VERSION: ${{ github.ref_name }}

jobs:

  # ── build-linux ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux x64 Bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore NexTraceOne.sln

      - name: Publish ApiHost (linux-x64)
        run: |
          dotnet publish src/platform/NexTraceOne.ApiHost/NexTraceOne.ApiHost.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output dist/linux/apihost \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false

      - name: Publish BackgroundWorkers (linux-x64)
        run: |
          dotnet publish src/platform/NexTraceOne.BackgroundWorkers/NexTraceOne.BackgroundWorkers.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output dist/linux/workers \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false

      - name: Publish IngestionApi (linux-x64)
        run: |
          dotnet publish src/platform/NexTraceOne.Ingestion.Api/NexTraceOne.Ingestion.Api.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            --output dist/linux/ingestion \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false

      - name: Copy upgrade script
        run: |
          cp build/scripts/upgrade.sh dist/linux/upgrade.sh
          chmod +x dist/linux/upgrade.sh

      - name: Package Linux bundle
        run: |
          mkdir -p artifacts
          tar -czf artifacts/nextraceone-linux-x64-${{ env.BUNDLE_VERSION }}.tar.gz \
            -C dist/linux .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: artifacts/nextraceone-linux-x64-${{ env.BUNDLE_VERSION }}.tar.gz
          retention-days: 90

  # ── build-windows ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows x64 Bundle
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore NexTraceOne.sln

      - name: Publish ApiHost (win-x64)
        run: |
          dotnet publish src/platform/NexTraceOne.ApiHost/NexTraceOne.ApiHost.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist\win\apihost `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false

      - name: Publish BackgroundWorkers (win-x64)
        run: |
          dotnet publish src/platform/NexTraceOne.BackgroundWorkers/NexTraceOne.BackgroundWorkers.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist\win\workers `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false

      - name: Publish IngestionApi (win-x64)
        run: |
          dotnet publish src/platform/NexTraceOne.Ingestion.Api/NexTraceOne.Ingestion.Api.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output dist\win\ingestion `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false

      - name: Package Windows bundle
        run: |
          mkdir -p artifacts
          Compress-Archive -Path dist\win\* -DestinationPath artifacts\nextraceone-windows-x64-${{ env.BUNDLE_VERSION }}.zip
        shell: pwsh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle
          path: artifacts/nextraceone-windows-x64-${{ env.BUNDLE_VERSION }}.zip
          retention-days: 90

  # ── publish-release ──────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: artifacts/

      - name: Download Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-bundle
          path: artifacts/

      - name: Generate checksums.sha256
        run: |
          cd artifacts
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NexTraceOne ${{ env.BUNDLE_VERSION }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/nextraceone-linux-x64-${{ env.BUNDLE_VERSION }}.tar.gz
            artifacts/nextraceone-windows-x64-${{ env.BUNDLE_VERSION }}.zip
            artifacts/checksums.sha256
