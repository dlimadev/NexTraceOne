# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Staging Delivery Pipeline
#
# Trigger: push para main (após CI passar) + manual dispatch
# Jobs:
#   build-images      → Builda e taga imagens Docker (SHA + staging tag)
#   push-registry     → Push para GitHub Container Registry (ghcr.io)
#   run-migrations    → Aplica migrations no banco de staging
#   smoke-check       → Validações pós-deploy
#
# Requisitos (GitHub Secrets):
#   STAGING_CONN_IDENTITY       Connection string banco identity (staging)
#   STAGING_CONN_CATALOG        Connection string banco catalog (staging)
#   STAGING_CONN_OPERATIONS     Connection string banco operations (staging)
#   STAGING_CONN_AI             Connection string banco ai (staging)
#   STAGING_APIHOST_URL         URL pública do ApiHost staging
#   STAGING_FRONTEND_URL        URL pública do Frontend staging
# ═══════════════════════════════════════════════════════════════════════════════

name: Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Apply database migrations"
        required: false
        default: "true"
        type: boolean
      skip_smoke:
        description: "Skip smoke checks"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nextraceone

jobs:

  # ── build-images ─────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    strategy:
      matrix:
        include:
          - name: apihost
            dockerfile: Dockerfile.apihost
          - name: workers
            dockerfile: Dockerfile.workers
          - name: ingestion
            dockerfile: Dockerfile.ingestion
          - name: frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${SHORT_SHA}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup .NET (for backend builds)
        if: matrix.name != 'frontend'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:staging
          build-args: |
            VITE_API_BASE_URL=${{ vars.STAGING_APIHOST_URL || 'http://localhost:8080' }}
            VITE_INGESTION_URL=${{ vars.STAGING_INGESTION_URL || 'http://localhost:8082' }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-${{ matrix.name }}:staging
          cache-to: type=inline
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

  # ── run-migrations ────────────────────────────────────────────────────────────
  run-migrations:
    name: Apply Migrations (Staging)
    runs-on: ubuntu-latest
    needs: build-images
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_migrations == 'true')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef --version 10.0.5

      - name: Restore solution
        run: dotnet restore NexTraceOne.sln

      - name: Build (without publish for ef tools)
        run: dotnet build NexTraceOne.sln --configuration Release --no-restore

      - name: Apply migrations — Staging
        run: bash scripts/db/apply-migrations.sh --env Staging
        env:
          MIGRATION_ENV: Staging
          CONN_IDENTITY: ${{ secrets.STAGING_CONN_IDENTITY }}
          CONN_CATALOG: ${{ secrets.STAGING_CONN_CATALOG }}
          CONN_OPERATIONS: ${{ secrets.STAGING_CONN_OPERATIONS }}
          CONN_AI: ${{ secrets.STAGING_CONN_AI }}

  # ── smoke-check ───────────────────────────────────────────────────────────────
  smoke-check:
    name: Post-Deploy Smoke Check
    runs-on: ubuntu-latest
    needs: [build-images, run-migrations]
    if: |
      always() &&
      needs.build-images.result == 'success' &&
      (needs.run-migrations.result == 'success' || needs.run-migrations.result == 'skipped') &&
      !(github.event_name == 'workflow_dispatch' && inputs.skip_smoke == 'true')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Wait for staging to become ready
        run: |
          echo "Waiting 30s for staging services to be ready..."
          sleep 30

      - name: Smoke check — ApiHost /live
        run: |
          APIHOST_URL="${{ vars.STAGING_APIHOST_URL || '' }}"
          if [ -z "$APIHOST_URL" ]; then
            echo "STAGING_APIHOST_URL not configured — skipping smoke check"
            exit 0
          fi
          curl -sf --retry 5 --retry-delay 10 "${APIHOST_URL}/live" | \
            jq -e '.status == "Healthy"' || \
            (echo "::error::ApiHost liveness check failed" && exit 1)

      - name: Smoke check — ApiHost /ready
        run: |
          APIHOST_URL="${{ vars.STAGING_APIHOST_URL || '' }}"
          if [ -z "$APIHOST_URL" ]; then
            exit 0
          fi
          curl -sf --retry 5 --retry-delay 10 "${APIHOST_URL}/ready" | \
            jq -e '.status == "Healthy"' || \
            (echo "::error::ApiHost readiness check failed" && exit 1)

      - name: Smoke check — Frontend loads
        run: |
          FRONTEND_URL="${{ vars.STAGING_FRONTEND_URL || '' }}"
          if [ -z "$FRONTEND_URL" ]; then
            echo "STAGING_FRONTEND_URL not configured — skipping frontend smoke check"
            exit 0
          fi
          HTTP_STATUS=$(curl -sLo /dev/null -w "%{http_code}" "${FRONTEND_URL}")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Frontend returned HTTP ${HTTP_STATUS}"
            exit 1
          fi
          echo "Frontend returned HTTP 200 ✓"

      - name: Report deployment
        run: |
          echo "## Staging Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Tag | ${{ needs.build-images.outputs.image-tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Git SHA | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Timestamp | $(date -u '+%Y-%m-%dT%H:%M:%SZ') |" >> "$GITHUB_STEP_SUMMARY"
