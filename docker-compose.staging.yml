# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Docker Compose Staging Override
#
# Ambiente de staging / pré-produção com ClickHouse para analytics e
# variáveis de ambiente de staging.
#
# Diferenças face ao docker-compose.yml de desenvolvimento:
#   - ClickHouse: autenticação activa com CLICKHOUSE_PASSWORD
#   - ASPNETCORE_ENVIRONMENT: Staging
#   - Auto-migração activa (NEXTRACE_AUTO_MIGRATE=true)
#   - Limites de memória moderados (inferiores aos de produção)
#
# Pré-requisitos:
#   1. Definir POSTGRES_PASSWORD, CLICKHOUSE_PASSWORD e NEXTRACE_JWT_SECRET em .env.staging
#   2. Arrancar com:
#        docker compose -f docker-compose.yml -f docker-compose.staging.yml \
#          --env-file .env.staging up -d
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── ClickHouse — autenticação activa (adequado para staging interno) ─────────
  clickhouse:
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required for staging}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --user default --password $$CLICKHOUSE_PASSWORD http://localhost:8123/ping || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.5"
        reservations:
          memory: 512M

  # ── PostgreSQL — limites moderados para staging ─────────────────────────────
  postgres:
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
        reservations:
          memory: 256M

  # ── ApiHost — ambiente Staging, auto-migração activa ────────────────────────
  apihost:
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      # Auto-migração activa em staging para facilitar deploy contínuo.
      NEXTRACE_AUTO_MIGRATE: "true"
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: "http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123"
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
        reservations:
          memory: 256M

  # ── BackgroundWorkers — ambiente Staging ────────────────────────────────────
  workers:
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: "http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # ── Ingestion API — ambiente Staging ────────────────────────────────────────
  ingestion:
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      Telemetry__ObservabilityProvider__ClickHouse__ConnectionString: "http://default:${CLICKHOUSE_PASSWORD}@clickhouse:8123"
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.75"
        reservations:
          memory: 128M

  # ── Frontend — limites leves ─────────────────────────────────────────────────
  frontend:
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
