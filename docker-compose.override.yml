# ═══════════════════════════════════════════════════════════════════════════════
# NexTraceOne — Docker Compose Override (Desenvolvimento Local)
#
# Uso: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# Overrides para desenvolvimento:
#   - ASPNETCORE_ENVIRONMENT=Development (seeds, logs verbose, auto-migrate)
#   - Source-code bind mounts substituídos por builds de imagem
#   - Portas adicionais para debug
#   - auto-migrate ativado
# ═══════════════════════════════════════════════════════════════════════════════

services:

  apihost:
    build:
      context: .
      dockerfile: Dockerfile.apihost
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      NEXTRACE_AUTO_MIGRATE: "true"
      NEXTRACE_SKIP_INTEGRITY: "true"
      # Em Development, as credentials vêm do appsettings.Development.json
      # Architecture: 1 single physical database for all modules
      ConnectionStrings__NexTraceOne: >-
        Host=postgres;Port=5432;Database=nextraceone;
        Username=${POSTGRES_USER:-nextraceone};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required};
        Maximum Pool Size=20
      Jwt__Secret: NexTraceOne-Development-SecretKey-AtLeast32BytesLong-2024!
      # OTEL collector is reachable via Docker network name, not localhost
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Telemetry__CollectionMode__OpenTelemetryCollector__OtlpGrpcEndpoint: http://otel-collector:4317
      Telemetry__CollectionMode__OpenTelemetryCollector__OtlpHttpEndpoint: http://otel-collector:4318
      Telemetry__CollectionMode__ClrProfiler__OtlpEndpoint: http://otel-collector:4317
      Telemetry__Collector__OtlpGrpcEndpoint: http://otel-collector:4317
      Telemetry__Collector__OtlpHttpEndpoint: http://otel-collector:4318

  workers:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      NEXTRACE_SKIP_INTEGRITY: "true"
      ConnectionStrings__NexTraceOne: >-
        Host=postgres;Port=5432;Database=nextraceone;
        Username=${POSTGRES_USER:-nextraceone};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required};
        Maximum Pool Size=20
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

  ingestion:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      NEXTRACE_SKIP_INTEGRITY: "true"
      ConnectionStrings__NexTraceOne: >-
        Host=postgres;Port=5432;Database=nextraceone;
        Username=${POSTGRES_USER:-nextraceone};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required};
        Maximum Pool Size=20
      Jwt__Secret: NexTraceOne-Development-SecretKey-AtLeast32BytesLong-2024!
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_USER: ${POSTGRES_USER:-nextraceone}
    ports:
      - "5432:5432"
